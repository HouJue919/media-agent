name: Media Agent CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile check
        run: python -m compileall -q main.py media_agent

      - name: Generate demo media
        run: python scripts/generate_demo_media.py

      - name: Run demo scan
        run: python main.py demo_media --language en --report demo_report.html --enable-ai-tags --ai-provider mock

      - name: Run tests
        run: pytest
